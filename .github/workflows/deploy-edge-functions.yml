name: Deploy Supabase Edge Functions

# Deploys every function in supabase/functions/ to production whenever a
# merge to main touches them — so AI prompt/pipeline changes ship with the
# same merge as the client code that expects them.
#
# Database migrations are INTENTIONALLY not applied here (see RULES.md —
# production data changes stay a deliberate, manual act).
#
# Required repo secret: SUPABASE_ACCESS_TOKEN
#   (supabase.com → Account → Access Tokens → "Generate new token")

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  # Manual trigger from the Actions tab — for catch-up deploys
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy all edge functions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: trxmbkkxfafrommyhwkl

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Guard — access token secret present
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Edge function integrity check
        run: node scripts/check-edge-function.mjs

      - name: Deploy every function in supabase/functions
        run: |
          set -e
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            echo "── Deploying $fn ──────────────────────────────"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
          done
          echo "All functions deployed ✓"
