<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- SVG favicon for modern browsers -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="icon" type="image/png" sizes="32x32"  href="/icon.png" />

    <link rel="manifest" href="/manifest.json" />
